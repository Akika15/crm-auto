{% extends 'crm_app/base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header bg-primary text-white">
                <h3 class="mb-0">{{ title }}</h3>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label for="id_client" class="form-label">Клиент</label>
                        {{ form.client }}
                    </div>
                    
                    <div class="mb-3">
                        <label for="id_vehicle" class="form-label">Автомобиль</label>
                        {{ form.vehicle }}
                    </div>
                    
                    <div class="mb-3">
                        <label for="id_status" class="form-label">Статус</label>
                        {{ form.status }}
                    </div>
                    
                    <div class="mb-3">
                        <label for="id_payment_method" class="form-label">Способ оплаты</label>
                        {{ form.payment_method }}
                    </div>
                    
                    <div class="mb-3">
                        <label for="id_delivery_method" class="form-label">Способ доставки</label>
                        {{ form.delivery_method }}
                    </div>
                    
                    <div class="mb-3">
                        <label for="id_comments" class="form-label">Комментарии</label>
                        {{ form.comments }}
                    </div>
                    
                    <button type="submit" class="btn btn-success">Сохранить</button>
                    <a href="{% url 'crm_app:order_list' %}" class="btn btn-secondary">Отмена</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
