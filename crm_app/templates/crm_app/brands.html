    const allBrands = Object.keys(brandsData);
    let currentPage = 1;
    const itemsPerPage = 12;
    const totalPages = Math.ceil(allBrands.length / itemsPerPage);
    
    function renderBrandsList() {
        const start = (currentPage - 1) * itemsPerPage;
        const end = start + itemsPerPage;
        const pageBrands = allBrands.slice(start, end);
        
        const container = document.getElementById('brandsList');
        container.innerHTML = '';
        
        pageBrands.forEach(brand => {
            const div = document.createElement('div');
            div.className = 'brand-item';
            div.setAttribute('data-brand', brand);
            div.innerHTML = `<strong>${brand}</strong>`;
            div.style.cursor = 'pointer';
            div.style.padding = '8px 0';
            div.style.borderBottom = '1px solid #eee';
            div.addEventListener('click', () => showBrandInfo(brand));
            container.appendChild(div);
        });
        
        document.getElementById('pageInfo').innerText = `Страница ${currentPage} из ${totalPages}`;
        document.getElementById('prevPage').disabled = currentPage === 1;
        document.getElementById('nextPage').disabled = currentPage === totalPages;
    }
    
    function showBrandInfo(brand) {
        const data = brandsData[brand];
        const brandTitle = document.getElementById('brandTitle');
        const brandInfo = document.getElementById('brandInfo');
        
        if (data) {
            brandTitle.innerText = brand;
            brandInfo.innerHTML = `
                <div class="text-center mb-3">
                    <img src="${data.image}" class="img-fluid" alt="${brand}" style="max-height: 100px; object-fit: contain; background: white; padding: 10px; border-radius: 12px;">
                </div>
                <div class="brand-description" style="font-size: 0.95rem; line-height: 1.6; text-align: justify;">
                    ${data.info}
                </div>
                <div class="text-center mt-4">
                    <a href="{% url 'crm_app:catalog' %}?search=${encodeURIComponent(brand)}" class="btn btn-primary btn-sm">Смотреть запчасти для ${brand}</a>
                </div>
            `;
        } else {
            brandTitle.innerText = brand;
            brandInfo.innerHTML = `
                <i class="bi bi-car-front" style="font-size: 64px; color: #6c757d;"></i>
                <p class="mt-3">Информация о марке "${brand}" будет добавлена позже.</p>
                <a href="{% url 'crm_app:catalog' %}?search=${encodeURIComponent(brand)}" class="btn btn-primary btn-sm mt-2">Смотреть запчасти для ${brand}</a>
            `;
        }
    }
    
    document.getElementById('prevPage').addEventListener('click', () => {
        if (currentPage > 1) {
            currentPage--;
            renderBrandsList();
        }
    });
    
    document.getElementById('nextPage').addEventListener('click', () => {
        if (currentPage < totalPages) {
            currentPage++;
            renderBrandsList();
        }
    });
    
    renderBrandsList();
</script>
