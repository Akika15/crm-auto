{% extends 'crm_app/base.html' %}

{% block content %}
<h1 class="mb-4">Марки авто</h1>

<div class="row">
    <div class="col-md-12">
        <div class="card">
            <div class="card-body">
                <div class="row">
                    <!-- Левая колонка - список марок с пагинацией -->
                    <div class="col-md-4">
                        <div class="brands-list-container">
                            <div id="brandsList"></div>
                            <div class="mt-3 text-center" id="paginationControls">
                                <button class="btn btn-sm btn-outline-primary" id="prevPage" disabled>← Назад</button>
                                <span class="mx-2" id="pageInfo">Страница 1</span>
                                <button class="btn btn-sm btn-outline-primary" id="nextPage">Вперед →</button>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Правая колонка - информация о марке -->
                    <div class="col-md-8">
                        <div class="card brand-info-card">
                            <div class="card-header bg-primary text-white">
                                <h5 class="mb-0" id="brandTitle">Выберите марку автомобиля</h5>
                            </div>
                            <div class="card-body text-center" id="brandInfo">
                                <i class="bi bi-car-front" style="font-size: 64px; color: #6c757d;"></i>
                                <p class="mt-3 text-muted">Нажмите на любую марку слева, чтобы увидеть информацию</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // ДАННЫЕ О МАРКАХ С РАБОТАЮЩИМИ КАРТИНКАМИ (через placehold.co и иконки)
    const brandsData = {
        // Французские
        'Citroen': { info: 'Citroen — французский автопроизводитель, основанный в 1919 году.', image: 'https://placehold.co/200x100/0d6efd/white?text=Citroen' },
        'Peugeot': { info: 'Peugeot — французский автопроизводитель, один из старейших в мире.', image: 'https://placehold.co/200x100/0d6efd/white?text=Peugeot' },
        'Renault': { info: 'Renault — французская автомобильная компания, основанная в 1899 году.', image: 'https://placehold.co/200x100/0d6efd/white?text=Renault' },
        // Китайские
        'BYD': { info: 'BYD — китайская компания, производитель электромобилей.', image: 'https://placehold.co/200x100/0d6efd/white?text=BYD' },
        'Geely': { info: 'Geely — китайский автопроизводитель, владелец Volvo.', image: 'https://placehold.co/200x100/0d6efd/white?text=Geely' },
        'Chery': { info: 'Chery — китайский автопроизводитель, известен доступными кроссоверами.', image: 'https://placehold.co/200x100/0d6efd/white?text=Chery' },
        // Японские
        'Acura': { info: 'Acura — премиальный бренд Honda, основанный в 1986 году.', image: 'https://placehold.co/200x100/0d6efd/white?text=Acura' },
        'Lexus': { info: 'Lexus — премиальный бренд Toyota, основанный в 1989 году.', image: 'https://placehold.co/200x100/0d6efd/white?text=Lexus' },
        'Infiniti': { info: 'Infiniti — премиальный бренд Nissan, основанный в 1989 году.', image: 'https://placehold.co/200x100/0d6efd/white?text=Infiniti' },
        'Toyota': { info: 'Toyota — японский автогигант, один из крупнейших в мире.', image: 'https://placehold.co/200x100/0d6efd/white?text=Toyota' },
        'Honda': { info: 'Honda — японский автопроизводитель, известен надёжностью.', image: 'https://placehold.co/200x100/0d6efd/white?text=Honda' },
        'Nissan': { info: 'Nissan — японский автопроизводитель.', image: 'https://placehold.co/200x100/0d6efd/white?text=Nissan' },
        'Mazda': { info: 'Mazda — японский автопроизводитель, известен дизайном.', image: 'https://placehold.co/200x100/0d6efd/white?text=Mazda' },
        'Subaru': { info: 'Subaru — японский автопроизводитель, известен полным приводом.', image: 'https://placehold.co/200x100/0d6efd/white?text=Subaru' },
        'Mitsubishi': { info: 'Mitsubishi — японский автопроизводитель.', image: 'https://placehold.co/200x100/0d6efd/white?text=Mitsubishi' },
        'Suzuki': { info: 'Suzuki — японский производитель компактных автомобилей.', image: 'https://placehold.co/200x100/0d6efd/white?text=Suzuki' },
        // Корейские
        'Hyundai': { info: 'Hyundai — южнокорейский автопроизводитель.', image: 'https://placehold.co/200x100/0d6efd/white?text=Hyundai' },
        'Kia': { info: 'Kia — южнокорейский автопроизводитель.', image: 'https://placehold.co/200x100/0d6efd/white?text=Kia' },
        'Genesis': { info: 'Genesis — премиальный бренд Hyundai.', image: 'https://placehold.co/200x100/0d6efd/white?text=Genesis' },
        // Немецкие
        'BMW': { info: 'BMW — немецкий производитель премиальных автомобилей.', image: 'https://placehold.co/200x100/0d6efd/white?text=BMW' },
        'Mercedes-Benz': { info: 'Mercedes-Benz — немецкий премиальный автопроизводитель.', image: 'https://placehold.co/200x100/0d6efd/white?text=Mercedes' },
        'Audi': { info: 'Audi — немецкий премиальный автопроизводитель.', image: 'https://placehold.co/200x100/0d6efd/white?text=Audi' },
        'Volkswagen': { info: 'Volkswagen — немецкий автопроизводитель.', image: 'https://placehold.co/200x100/0d6efd/white?text=Volkswagen' },
        'Porsche': { info: 'Porsche — немецкий производитель спортивных автомобилей.', image: 'https://placehold.co/200x100/0d6efd/white?text=Porsche' },
        'Opel': { info: 'Opel — немецкий автопроизводитель.', image: 'https://placehold.co/200x100/0d6efd/white?text=Opel' },
        // Американские
        'Ford': { info: 'Ford — американский автопроизводитель.', image: 'https://placehold.co/200x100/0d6efd/white?text=Ford' },
        'Chevrolet': { info: 'Chevrolet — американский бренд.', image: 'https://placehold.co/200x100/0d6efd/white?text=Chevrolet' },
        'Dodge': { info: 'Dodge — американский производитель мощных автомобилей.', image: 'https://placehold.co/200x100/0d6efd/white?text=Dodge' },
        'Jeep': { info: 'Jeep — американский бренд внедорожников.', image: 'https://placehold.co/200x100/0d6efd/white?text=Jeep' },
        'Tesla': { info: 'Tesla — американский производитель электромобилей.', image: 'https://placehold.co/200x100/0d6efd/white?text=Tesla' },
        // Британские
        'Jaguar': { info: 'Jaguar — британский производитель премиальных автомобилей.', image: 'https://placehold.co/200x100/0d6efd/white?text=Jaguar' },
        'Land Rover': { info: 'Land Rover — британский производитель внедорожников.', image: 'https://placehold.co/200x100/0d6efd/white?text=Land+Rover' },
        'Mini': { info: 'Mini — британский производитель компактных автомобилей.', image: 'https://placehold.co/200x100/0d6efd/white?text=Mini' },
        'Volvo': { info: 'Volvo — шведский автопроизводитель, известен безопасностью.', image: 'https://placehold.co/200x100/0d6efd/white?text=Volvo' },
        // Итальянские
        'Fiat': { info: 'Fiat — итальянский автопроизводитель.', image: 'https://placehold.co/200x100/0d6efd/white?text=Fiat' },
        'Ferrari': { info: 'Ferrari — итальянский производитель суперкаров.', image: 'https://placehold.co/200x100/0d6efd/white?text=Ferrari' },
        'Lamborghini': { info: 'Lamborghini — итальянский производитель суперкаров.', image: 'https://placehold.co/200x100/0d6efd/white?text=Lamborghini' },
        'Maserati': { info: 'Maserati — итальянский производитель люксовых автомобилей.', image: 'https://placehold.co/200x100/0d6efd/white?text=Maserati' },
        'Alfa Romeo': { info: 'Alfa Romeo — итальянский автопроизводитель.', image: 'https://placehold.co/200x100/0d6efd/white?text=Alfa+Romeo' },
        // Российские
        'Lada (ВАЗ)': { info: 'LADA — российский автопроизводитель, крупнейший в стране.', image: 'https://placehold.co/200x100/0d6efd/white?text=Lada' },
        'УАЗ': { info: 'УАЗ — российский производитель внедорожников.', image: 'https://placehold.co/200x100/0d6efd/white?text=UAZ' },
        'ГАЗ': { info: 'ГАЗ — российский производитель грузовых и легковых автомобилей.', image: 'https://placehold.co/200x100/0d6efd/white?text=GAZ' },
        'Иномарки': { info: 'Иномарки — автомобили зарубежного производства.', image: 'https://placehold.co/200x100/0d6efd/white?text=Import' },
    };

    const allBrands = Object.keys(brandsData);
    let currentPage = 1;
    const itemsPerPage = 12;
    const totalPages = Math.ceil(allBrands.length / itemsPerPage);
    
    function renderBrandsList() {
        const start = (currentPage - 1) * itemsPerPage;
        const end = start + itemsPerPage;
        const pageBrands = allBrands.slice(start, end);
        
        const container = document.getElementById('brandsList');
        container.innerHTML = '';
        
        pageBrands.forEach(brand => {
            const div = document.createElement('div');
            div.className = 'brand-item';
            div.setAttribute('data-brand', brand);
            div.innerHTML = `<strong>${brand}</strong>`;
            div.style.cursor = 'pointer';
            div.style.padding = '8px 0';
            div.style.borderBottom = '1px solid #eee';
            div.addEventListener('click', () => showBrandInfo(brand));
            container.appendChild(div);
        });
        
        document.getElementById('pageInfo').innerText = `Страница ${currentPage} из ${totalPages}`;
        document.getElementById('prevPage').disabled = currentPage === 1;
        document.getElementById('nextPage').disabled = currentPage === totalPages;
    }
    
    function showBrandInfo(brand) {
        const data = brandsData[brand];
        const brandTitle = document.getElementById('brandTitle');
        const brandInfo = document.getElementById('brandInfo');
        
        if (data) {
            brandTitle.innerText = brand;
            brandInfo.innerHTML = `
                <img src="${data.image}" class="img-fluid mb-3" alt="${brand}" style="max-height: 100px; object-fit: contain;">
                <p class="mt-2">${data.info}</p>
                <a href="{% url 'crm_app:catalog' %}?search=${encodeURIComponent(brand)}" class="btn btn-primary btn-sm mt-2">Смотреть запчасти для ${brand}</a>
            `;
        } else {
            brandTitle.innerText = brand;
            brandInfo.innerHTML = `
                <i class="bi bi-car-front" style="font-size: 64px; color: #6c757d;"></i>
                <p class="mt-3">Информация о марке "${brand}" будет добавлена позже.</p>
                <a href="{% url 'crm_app:catalog' %}?search=${encodeURIComponent(brand)}" class="btn btn-primary btn-sm mt-2">Смотреть запчасти для ${brand}</a>
            `;
        }
    }
    
    document.getElementById('prevPage').addEventListener('click', () => {
        if (currentPage > 1) {
            currentPage--;
            renderBrandsList();
        }
    });
    
    document.getElementById('nextPage').addEventListener('click', () => {
        if (currentPage < totalPages) {
            currentPage++;
            renderBrandsList();
        }
    });
    
    renderBrandsList();
</script>

<style>
    .brand-item {
        cursor: pointer;
        padding: 8px 0;
        border-bottom: 1px solid #eee;
        transition: color 0.2s;
    }
    .brand-item:hover {
        color: #0d6efd;
    }
    .brand-info-card {
        position: sticky;
        top: 20px;
    }
    #paginationControls {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 10px;
        margin-top: 15px;
    }
</style>
{% endblock %}
