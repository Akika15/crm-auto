                    <div class="col-md-4">
                        <div class="brands-list-container">
                            <div id="brandsList"></div>
                            <div class="mt-3 text-center" id="paginationControls">
                                <button class="btn btn-sm btn-outline-primary" id="prevPage" disabled>← Назад</button>
                                <span class="mx-2" id="pageInfo">Страница 1</span>
                                <button class="btn btn-sm btn-outline-primary" id="nextPage">Вперед →</button>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Правая колонка - информация о марке -->

                                <h5 class="mb-0" id="brandTitle">Выберите марку автомобиля</h5>
                            </div>
                            <div class="card-body text-center" id="brandInfo">
                                <i class="bi bi-car-front" style="font-size: 64px; color: #6c757d;"></i>
                                <p class="mt-3 text-muted">Нажмите на любую марку слева, чтобы увидеть информацию</p>

                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

            image: 'https://cdn.jsdelivr.net/gh/vehiclespecs/brand-logos@v1.0.0/import-logo.svg'
        }
    };

    const allBrands = Object.keys(brandsData);
    let currentPage = 1;
    const itemsPerPage = 12;
    const totalPages = Math.ceil(allBrands.length / itemsPerPage);
    
    function renderBrandsList() {
        const start = (currentPage - 1) * itemsPerPage;
        const end = start + itemsPerPage;
        const pageBrands = allBrands.slice(start, end);
        
        const container = document.getElementById('brandsList');
        container.innerHTML = '';
        
        pageBrands.forEach(brand => {
            const div = document.createElement('div');
            div.className = 'brand-item';
            div.setAttribute('data-brand', brand);
            div.innerHTML = `<strong>${brand}</strong>`;
            div.style.cursor = 'pointer';
            div.style.padding = '8px 0';
            div.style.borderBottom = '1px solid #eee';
            div.addEventListener('click', () => showBrandInfo(brand));
            container.appendChild(div);
        });
        
        document.getElementById('pageInfo').innerText = `Страница ${currentPage} из ${totalPages}`;
        document.getElementById('prevPage').disabled = currentPage === 1;
        document.getElementById('nextPage').disabled = currentPage === totalPages;
    }
    
    function showBrandInfo(brand) {
        const data = brandsData[brand];
        const brandTitle = document.getElementById('brandTitle');
        const brandInfo = document.getElementById('brandInfo');
        
        if (data) {
            brandTitle.innerText = brand;
            brandInfo.innerHTML = `
                <img src="${data.image}" class="img-fluid mb-3" alt="${brand}" style="max-height: 100px; object-fit: contain; background: white; padding: 10px; border-radius: 12px;">
                <p class="mt-2">${data.info}</p>
                <a href="{% url 'crm_app:catalog' %}?search=${encodeURIComponent(brand)}" class="btn btn-primary btn-sm mt-2">Смотреть запчасти для ${brand}</a>
            `;
        } else {
            brandTitle.innerText = brand;
            brandInfo.innerHTML = `
                <i class="bi bi-car-front" style="font-size: 64px; color: #6c757d;"></i>
                <p class="mt-3">Информация о марке "${brand}" будет добавлена позже.</p>
                <a href="{% url 'crm_app:catalog' %}?search=${encodeURIComponent(brand)}" class="btn btn-primary btn-sm mt-2">Смотреть запчасти для ${brand}</a>
            `;
        }
    }
    
    document.getElementById('prevPage').addEventListener('click', () => {
        if (currentPage > 1) {
            currentPage--;
            renderBrandsList();
        }
    });
    
    document.getElementById('nextPage').addEventListener('click', () => {
        if (currentPage < totalPages) {
            currentPage++;
            renderBrandsList();
        }
    });
    
    renderBrandsList();
</script>

<style>

    .brand-item:hover {

    }
    .brand-info-card {

        top: 20px;
    }
    #paginationControls {
        display: flex;

        align-items: center;
