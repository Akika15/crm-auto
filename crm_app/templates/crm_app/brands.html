{% extends 'crm_app/base.html' %}

{% block content %}
<h1 class="mb-4">Марки авто</h1>

<div class="row">
    <div class="col-md-12">
        <div class="card">
            <div class="card-body">
                <div class="row">
                    <!-- Левая колонка - список марок с пагинацией -->
                    <div class="col-md-4">
                        <div class="brands-list-container">
                            <div id="brandsList"></div>
                            <div class="mt-3 text-center" id="paginationControls">
                                <button class="btn btn-sm btn-outline-primary" id="prevPage" disabled>← Назад</button>
                                <span class="mx-2" id="pageInfo">Страница 1</span>
                                <button class="btn btn-sm btn-outline-primary" id="nextPage">Вперед →</button>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Правая колонка - информация о марке -->
                    <div class="col-md-8">
                        <div class="card brand-info-card">
                            <div class="card-header bg-primary text-white">
                                <h5 class="mb-0" id="brandTitle">Выберите марку автомобиля</h5>
                            </div>
                            <div class="card-body text-center" id="brandInfo">
                                <i class="bi bi-car-front" style="font-size: 64px; color: #6c757d;"></i>
                                <p class="mt-3 text-muted">Нажмите на любую марку слева, чтобы увидеть информацию</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // ДАННЫЕ О МАРКАХ С РЕАЛЬНЫМИ ЛОГОТИПАМИ

        'Peugeot': { info: 'Peugeot — французский автопроизводитель, один из старейших в мире.', image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/9/9a/Peugeot-logo.svg/200px-Peugeot-logo.svg.png' },
        'Renault': { info: 'Renault — французская автомобильная компания, основанная в 1899 году.', image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/c/c7/Renault_Logo.svg/200px-Renault_Logo.svg.png' },
        // Китайские
        'BYD': { info: 'BYD — китайская компания, производитель электромобилей.', image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/e/ed/BYD_Auto_Logo.svg/200px-BYD_Auto_Logo.svg.png' },
        'Geely': { info: 'Geely — китайский автопроизводитель, владелец Volvo.', image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/6/6e/Geely_Logo.svg/200px-Geely_Logo.svg.png' },
        'Chery': { info: 'Chery — китайский автопроизводитель, известен доступными кроссоверами.', image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/6/6b/Chery_logo.svg/200px-Chery_logo.svg.png' },
        // Японские

        'Lexus': { info: 'Lexus — премиальный бренд Toyota, основанный в 1989 году.', image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/4/4d/Lexus_division_logo.svg/200px-Lexus_division_logo.svg.png' },
        'Infiniti': { info: 'Infiniti — премиальный бренд Nissan, основанный в 1989 году.', image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/9/9c/Infiniti_logo.svg/200px-Infiniti_logo.svg.png' },
        'Toyota': { info: 'Toyota — японский автогигант, один из крупнейших в мире.', image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/9/93/Toyota_EU_logo.svg/200px-Toyota_EU_logo.svg.png' },
        'Honda': { info: 'Honda — японский автопроизводитель, известен надёжностью.', image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/1/17/Honda.svg/200px-Honda.svg.png' },
        'Nissan': { info: 'Nissan — японский автопроизводитель.', image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/7/7a/Nissan_logo_2020.svg/200px-Nissan_logo_2020.svg.png' },
        'Mazda': { info: 'Mazda — японский автопроизводитель, известен дизайном.', image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/5/54/Mazda_logo_%282015%29.svg/200px-Mazda_logo_%282015%29.svg.png' },
        'Subaru': { info: 'Subaru — японский автопроизводитель, известен полным приводом.', image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/1/1b/Subaru_logo.svg/200px-Subaru_logo.svg.png' },
        'Mitsubishi': { info: 'Mitsubishi — японский автопроизводитель.', image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/6/68/Mitsubishi_logo.svg/200px-Mitsubishi_logo.svg.png' },

        // Корейские
        'Hyundai': { info: 'Hyundai — южнокорейский автопроизводитель.', image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/4/44/Hyundai_Motor_Company_logo.svg/200px-Hyundai_Motor_Company_logo.svg.png' },
        'Kia': { info: 'Kia — южнокорейский автопроизводитель, часть группы Hyundai.', image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/0/0d/Kia_Motors_logo.svg/200px-Kia_Motors_logo.svg.png' },
        'Genesis': { info: 'Genesis — премиальный бренд Hyundai, основанный в 2015 году.', image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/8/82/Genesis_logo.svg/200px-Genesis_logo.svg.png' },
        // Немецкие
        'BMW': { info: 'BMW — немецкий производитель премиальных автомобилей.', image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/4/44/BMW.svg/200px-BMW.svg.png' },
        'Mercedes-Benz': { info: 'Mercedes-Benz — немецкий премиальный автопроизводитель.', image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/9/96/Mercedes-Benz_logo_2010.svg/200px-Mercedes-Benz_logo_2010.svg.png' },
        'Audi': { info: 'Audi — немецкий премиальный автопроизводитель.', image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/9/92/Audi-Logo_2016.svg/200px-Audi-Logo_2016.svg.png' },
        'Volkswagen': { info: 'Volkswagen — немецкий автопроизводитель.', image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/9/9a/Volkswagen_logo.svg/200px-Volkswagen_logo.svg.png' },
        'Porsche': { info: 'Porsche — немецкий производитель спортивных автомобилей.', image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/8/8a/Porsche_logo.svg/200px-Porsche_logo.svg.png' },
        'Opel': { info: 'Opel — немецкий автопроизводитель.', image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/6/62/Opel_Logo.svg/200px-Opel_Logo.svg.png' },
        // Американские
        'Ford': { info: 'Ford — американский автопроизводитель.', image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/3/3e/Ford_logo_flat.svg/200px-Ford_logo_flat.svg.png' },
        'Chevrolet': { info: 'Chevrolet — американский бренд, часть General Motors.', image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/8/8a/Chevrolet_logo.svg/200px-Chevrolet_logo.svg.png' },
        'Dodge': { info: 'Dodge — американский производитель мощных автомобилей.', image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/2/2b/Dodge_logo.svg/200px-Dodge_logo.svg.png' },
        'Jeep': { info: 'Jeep — американский бренд внедорожников.', image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/5/5e/Jeep_logo.svg/200px-Jeep_logo.svg.png' },
        'Tesla': { info: 'Tesla — американский производитель электромобилей.', image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/b/bd/Tesla_Motors.svg/200px-Tesla_Motors.svg.png' },
        // Британские
        'Jaguar': { info: 'Jaguar — британский производитель премиальных автомобилей.', image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/4/41/Jaguar_logo.svg/200px-Jaguar_logo.svg.png' },
        'Land Rover': { info: 'Land Rover — британский производитель внедорожников.', image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/8/8a/Land_Rover_logo.svg/200px-Land_Rover_logo.svg.png' },
        'Mini': { info: 'Mini — британский производитель компактных автомобилей.', image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/3/3b/Mini_logo.svg/200px-Mini_logo.svg.png' },
        'Volvo': { info: 'Volvo — шведский автопроизводитель, известен безопасностью.', image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/d/dd/Volvo_Logo.svg/200px-Volvo_Logo.svg.png' },
        // Итальянские
        'Fiat': { info: 'Fiat — итальянский автопроизводитель.', image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/8/80/Fiat_Logo.svg/200px-Fiat_Logo.svg.png' },
        'Ferrari': { info: 'Ferrari — итальянский производитель суперкаров.', image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/3/35/Ferrari_logo.svg/200px-Ferrari_logo.svg.png' },
        'Lamborghini': { info: 'Lamborghini — итальянский производитель суперкаров.', image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/9/9a/Lamborghini_logo.svg/200px-Lamborghini_logo.svg.png' },
        'Maserati': { info: 'Maserati — итальянский производитель люксовых автомобилей.', image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/5/53/Maserati_logo.svg/200px-Maserati_logo.svg.png' },
        'Alfa Romeo': { info: 'Alfa Romeo — итальянский автопроизводитель.', image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/c/cc/Alfa_Romeo_logo.svg/200px-Alfa_Romeo_logo.svg.png' },
        // Российские
        'Lada (ВАЗ)': { info: 'LADA — российский автопроизводитель, крупнейший в стране.', image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/5/58/Lada_logo_2002.svg/200px-Lada_logo_2002.svg.png' },
        'УАЗ': { info: 'УАЗ — российский производитель внедорожников.', image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/6/6b/UAZ_Logo.svg/200px-UAZ_Logo.svg.png' },
        'ГАЗ': { info: 'ГАЗ — российский производитель грузовых и легковых автомобилей.', image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/9/96/GAS_logo.svg/200px-GAS_logo.svg.png' },
        'Иномарки': { info: 'Иномарки — автомобили зарубежного производства.', image: 'https://cdn-icons-png.flaticon.com/512/1042/1042379.png' },
    };

    const allBrands = Object.keys(brandsData);
    let currentPage = 1;
    const itemsPerPage = 12;
    const totalPages = Math.ceil(allBrands.length / itemsPerPage);
    
    function renderBrandsList() {
        const start = (currentPage - 1) * itemsPerPage;
        const end = start + itemsPerPage;
        const pageBrands = allBrands.slice(start, end);
        
        const container = document.getElementById('brandsList');
        container.innerHTML = '';
        
        pageBrands.forEach(brand => {
            const div = document.createElement('div');
            div.className = 'brand-item';
            div.setAttribute('data-brand', brand);
            div.innerHTML = `<strong>${brand}</strong>`;
            div.style.cursor = 'pointer';
            div.style.padding = '8px 0';
            div.style.borderBottom = '1px solid #eee';
            div.addEventListener('click', () => showBrandInfo(brand));
            container.appendChild(div);
        });
        
        document.getElementById('pageInfo').innerText = `Страница ${currentPage} из ${totalPages}`;
        document.getElementById('prevPage').disabled = currentPage === 1;
        document.getElementById('nextPage').disabled = currentPage === totalPages;
    }
    
    function showBrandInfo(brand) {
        const data = brandsData[brand];
        const brandTitle = document.getElementById('brandTitle');
        const brandInfo = document.getElementById('brandInfo');
        
        if (data) {
            brandTitle.innerText = brand;
            brandInfo.innerHTML = `
                <img src="${data.image}" class="img-fluid mb-3" alt="${brand}" style="max-height: 100px; object-fit: contain;">
                <p class="mt-2">${data.info}</p>
                <a href="{% url 'crm_app:catalog' %}?search=${encodeURIComponent(brand)}" class="btn btn-primary btn-sm mt-2">Смотреть запчасти для ${brand}</a>
            `;
        } else {
            brandTitle.innerText = brand;
            brandInfo.innerHTML = `
                <i class="bi bi-car-front" style="font-size: 64px; color: #6c757d;"></i>
                <p class="mt-3">Информация о марке "${brand}" будет добавлена позже.</p>
                <a href="{% url 'crm_app:catalog' %}?search=${encodeURIComponent(brand)}" class="btn btn-primary btn-sm mt-2">Смотреть запчасти для ${brand}</a>
            `;
        }
    }
    
    document.getElementById('prevPage').addEventListener('click', () => {
        if (currentPage > 1) {
            currentPage--;
            renderBrandsList();
        }
    });
    
    document.getElementById('nextPage').addEventListener('click', () => {
        if (currentPage < totalPages) {
            currentPage++;
            renderBrandsList();
        }
    });
    
    renderBrandsList();
</script>

<style>
    .brand-item {
        cursor: pointer;
        padding: 8px 0;
        border-bottom: 1px solid #eee;
        transition: color 0.2s;
    }
    .brand-item:hover {
        color: #0d6efd;
    }
    .brand-info-card {
        position: sticky;
        top: 20px;
    }
    #paginationControls {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 10px;
        margin-top: 15px;
    }
</style>
{% endblock %}
