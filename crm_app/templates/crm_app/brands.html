{% extends 'crm_app/base.html' %}

{% block content %}
<h1 class="mb-4">Марки авто</h1>

<div class="row">
    <div class="col-md-12">
        <div class="card">
            <div class="card-body">
                <div class="row">
                    <!-- Левая колонка - список марок с пагинацией -->
                    <div class="col-md-4">
                        <div class="brands-list-container">
                            <div id="brandsList"></div>
                            <div class="mt-3 text-center" id="paginationControls">
                                <button class="btn btn-sm btn-outline-primary" id="prevPage" disabled>← Назад</button>
                                <span class="mx-2" id="pageInfo">Страница 1</span>
                                <button class="btn btn-sm btn-outline-primary" id="nextPage">Вперед →</button>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Правая колонка - информация о марке -->
                    <div class="col-md-8">
                        <div class="card brand-info-card">
                            <div class="card-header bg-primary text-white">
                                <h5 class="mb-0" id="brandTitle">Выберите марку автомобиля</h5>
                            </div>
                            <div class="card-body text-center" id="brandInfo">
                                <i class="bi bi-car-front" style="font-size: 64px; color: #6c757d;"></i>
                                <p class="mt-3 text-muted">Нажмите на любую марку или модель слева, чтобы увидеть информацию</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

        'Peugeot': { info: 'Peugeot — французский автопроизводитель, один из старейших в мире. Основан в 1810 году.', image: 'https://cdn-icons-png.flaticon.com/512/1042/1042379.png' },
        'Renault': { info: 'Renault — французская автомобильная компания, основанная в 1899 году. Известна надёжными и доступными автомобилями.', image: 'https://cdn-icons-png.flaticon.com/512/1042/1042379.png' },
        // Китайские
        'BYD': { info: 'BYD — китайская компания, производитель электромобилей и аккумуляторов. Один из лидеров рынка электромобилей в мире.', image: 'https://cdn-icons-png.flaticon.com/512/1042/1042379.png' },
        'Geely': { info: 'Geely — китайский автопроизводитель, владелец Volvo и Lotus.', image: 'https://cdn-icons-png.flaticon.com/512/1042/1042379.png' },
        'Chery': { info: 'Chery — китайский автопроизводитель, известен доступными кроссоверами.', image: 'https://cdn-icons-png.flaticon.com/512/1042/1042379.png' },
        // Японские
        'Acura': { info: 'Acura — премиальный бренд Honda, основанный в 1986 году. Производит автомобили бизнес-класса.', image: 'https://cdn-icons-png.flaticon.com/512/1042/1042379.png' },
        'Lexus': { info: 'Lexus — премиальный бренд Toyota, основанный в 1989 году. Лидер по надёжности среди люксовых автомобилей.', image: 'https://cdn-icons-png.flaticon.com/512/1042/1042379.png' },
        'Infiniti': { info: 'Infiniti — премиальный бренд Nissan, основанный в 1989 году.', image: 'https://cdn-icons-png.flaticon.com/512/1042/1042379.png' },

        'Honda': { info: 'Honda — японский автопроизводитель, известен надёжностью.', image: 'https://cdn-icons-png.flaticon.com/512/1042/1042379.png' },
        'Nissan': { info: 'Nissan — японский автопроизводитель.', image: 'https://cdn-icons-png.flaticon.com/512/1042/1042379.png' },
        'Mazda': { info: 'Mazda — японский автопроизводитель, известен дизайном и технологиями.', image: 'https://cdn-icons-png.flaticon.com/512/1042/1042379.png' },
        'Subaru': { info: 'Subaru — японский автопроизводитель, известен полным приводом и оппозитными двигателями.', image: 'https://cdn-icons-png.flaticon.com/512/1042/1042379.png' },
        'Mitsubishi': { info: 'Mitsubishi — японский автопроизводитель, известен внедорожниками и технологиями.', image: 'https://cdn-icons-png.flaticon.com/512/1042/1042379.png' },
        'Suzuki': { info: 'Suzuki — японский автопроизводитель, специализируется на компактных автомобилях и внедорожниках.', image: 'https://cdn-icons-png.flaticon.com/512/1042/1042379.png' },
        'Isuzu': { info: 'Isuzu — японский производитель грузовиков и внедорожников.', image: 'https://cdn-icons-png.flaticon.com/512/1042/1042379.png' },
        // Корейские
        'Hyundai': { info: 'Hyundai — южнокорейский автопроизводитель, известен соотношением цены и качества.', image: 'https://cdn-icons-png.flaticon.com/512/1042/1042379.png' },
        'Kia': { info: 'Kia — южнокорейский автопроизводитель, часть группы Hyundai.', image: 'https://cdn-icons-png.flaticon.com/512/1042/1042379.png' },
        'Genesis': { info: 'Genesis — премиальный бренд Hyundai, основанный в 2015 году.', image: 'https://cdn-icons-png.flaticon.com/512/1042/1042379.png' },
        // Немецкие
        'BMW': { info: 'BMW — немецкий автопроизводитель, специализирующийся на премиальных автомобилях.', image: 'https://cdn-icons-png.flaticon.com/512/1042/1042379.png' },
        'Mercedes-Benz': { info: 'Mercedes-Benz — немецкий премиальный автопроизводитель.', image: 'https://cdn-icons-png.flaticon.com/512/1042/1042379.png' },
        'Audi': { info: 'Audi — немецкий премиальный автопроизводитель, часть концерна VAG.', image: 'https://cdn-icons-png.flaticon.com/512/1042/1042379.png' },
        'Volkswagen': { info: 'Volkswagen — немецкий автопроизводитель, один из крупнейших в мире.', image: 'https://cdn-icons-png.flaticon.com/512/1042/1042379.png' },
        'Porsche': { info: 'Porsche — немецкий производитель спортивных автомобилей и кроссоверов.', image: 'https://cdn-icons-png.flaticon.com/512/1042/1042379.png' },
        'Opel': { info: 'Opel — немецкий автопроизводитель, сейчас часть концерна Stellantis.', image: 'https://cdn-icons-png.flaticon.com/512/1042/1042379.png' },
        // Американские
        'Ford': { info: 'Ford — американский автопроизводитель, один из старейших в мире.', image: 'https://cdn-icons-png.flaticon.com/512/1042/1042379.png' },
        'Chevrolet': { info: 'Chevrolet — американский бренд, часть концерна General Motors.', image: 'https://cdn-icons-png.flaticon.com/512/1042/1042379.png' },
        'Dodge': { info: 'Dodge — американский автопроизводитель, известен мощными автомобилями.', image: 'https://cdn-icons-png.flaticon.com/512/1042/1042379.png' },
        'Jeep': { info: 'Jeep — американский бренд, специализирующийся на внедорожниках.', image: 'https://cdn-icons-png.flaticon.com/512/1042/1042379.png' },
        'Chrysler': { info: 'Chrysler — американский автопроизводитель, часть концерна Stellantis.', image: 'https://cdn-icons-png.flaticon.com/512/1042/1042379.png' },
        'Tesla': { info: 'Tesla — американский производитель электромобилей, лидер в области электротранспорта.', image: 'https://cdn-icons-png.flaticon.com/512/1042/1042379.png' },
        // Британские
        'Jaguar': { info: 'Jaguar — британский производитель премиальных автомобилей.', image: 'https://cdn-icons-png.flaticon.com/512/1042/1042379.png' },
        'Land Rover': { info: 'Land Rover — британский производитель престижных внедорожников.', image: 'https://cdn-icons-png.flaticon.com/512/1042/1042379.png' },
        'Mini': { info: 'Mini — британский автопроизводитель компактных автомобилей, часть BMW.', image: 'https://cdn-icons-png.flaticon.com/512/1042/1042379.png' },
        'Bentley': { info: 'Bentley — британский производитель люксовых автомобилей.', image: 'https://cdn-icons-png.flaticon.com/512/1042/1042379.png' },
        'Rolls-Royce': { info: 'Rolls-Royce — британский производитель超люксовых автомобилей.', image: 'https://cdn-icons-png.flaticon.com/512/1042/1042379.png' },
        // Шведские
        'Volvo': { info: 'Volvo — шведский автопроизводитель, известен безопасностью.', image: 'https://cdn-icons-png.flaticon.com/512/1042/1042379.png' },
        // Итальянские
        'Fiat': { info: 'Fiat — итальянский автопроизводитель, часть концерна Stellantis.', image: 'https://cdn-icons-png.flaticon.com/512/1042/1042379.png' },
        'Ferrari': { info: 'Ferrari — итальянский производитель спортивных автомобилей.', image: 'https://cdn-icons-png.flaticon.com/512/1042/1042379.png' },
        'Lamborghini': { info: 'Lamborghini — итальянский производитель суперкаров.', image: 'https://cdn-icons-png.flaticon.com/512/1042/1042379.png' },
        'Maserati': { info: 'Maserati — итальянский производитель люксовых автомобилей.', image: 'https://cdn-icons-png.flaticon.com/512/1042/1042379.png' },
        'Alfa Romeo': { info: 'Alfa Romeo — итальянский автопроизводитель с богатой историей.', image: 'https://cdn-icons-png.flaticon.com/512/1042/1042379.png' },
        // Российские
        'Lada (ВАЗ)': { info: 'LADA — российский автопроизводитель, крупнейший в стране. Выпускает доступные и надёжные автомобили.', image: 'https://cdn-icons-png.flaticon.com/512/1042/1042379.png' },
        'ВАЗ (классика)': { info: 'ВАЗ (Волжский автомобильный завод) — классические модели: Жигули, Нива, Самара.', image: 'https://cdn-icons-png.flaticon.com/512/1042/1042379.png' },
        'УАЗ': { info: 'УАЗ — российский производитель внедорожников и коммерческих автомобилей.', image: 'https://cdn-icons-png.flaticon.com/512/1042/1042379.png' },
        'ГАЗ': { info: 'ГАЗ — российский производитель грузовых и легковых автомобилей.', image: 'https://cdn-icons-png.flaticon.com/512/1042/1042379.png' },
        'Иномарки': { info: 'Иномарки — автомобили зарубежного производства. В нашем каталоге представлены запчасти для популярных иномарок.', image: 'https://cdn-icons-png.flaticon.com/512/1042/1042379.png' },
    };

    // Получаем список всех марок
    const allBrands = Object.keys(brandsData);
    
    // Пагинация
    let currentPage = 1;
    const itemsPerPage = 12;
    const totalPages = Math.ceil(allBrands.length / itemsPerPage);
    
    function renderBrandsList() {
        const start = (currentPage - 1) * itemsPerPage;
        const end = start + itemsPerPage;
        const pageBrands = allBrands.slice(start, end);
        
        const container = document.getElementById('brandsList');
        container.innerHTML = '';
        
        pageBrands.forEach(brand => {
            const div = document.createElement('div');
            div.className = 'brand-item';
            div.setAttribute('data-brand', brand);
            div.innerHTML = `<strong>${brand}</strong>`;
            div.style.cursor = 'pointer';
            div.style.padding = '8px 0';
            div.style.borderBottom = '1px solid #eee';
            div.addEventListener('click', () => showBrandInfo(brand));
            container.appendChild(div);
        });
        
        document.getElementById('pageInfo').innerText = `Страница ${currentPage} из ${totalPages}`;
        document.getElementById('prevPage').disabled = currentPage === 1;
        document.getElementById('nextPage').disabled = currentPage === totalPages;
    }
    
    function showBrandInfo(brand) {
        const data = brandsData[brand];
        const brandTitle = document.getElementById('brandTitle');
        const brandInfo = document.getElementById('brandInfo');
        
        if (data) {
            brandTitle.innerText = brand;
            brandInfo.innerHTML = `
                <img src="${data.image}" class="img-fluid mb-3" alt="${brand}" style="max-height: 100px; object-fit: contain;">
                <p class="mt-2">${data.info}</p>
                <a href="{% url 'crm_app:catalog' %}?search=${encodeURIComponent(brand)}" class="btn btn-primary btn-sm mt-2">Смотреть запчасти для ${brand}</a>
            `;
        } else {
            brandTitle.innerText = brand;
            brandInfo.innerHTML = `
                <i class="bi bi-car-front" style="font-size: 64px; color: #6c757d;"></i>
                <p class="mt-3">Информация о марке "${brand}" будет добавлена позже.</p>
                <a href="{% url 'crm_app:catalog' %}?search=${encodeURIComponent(brand)}" class="btn btn-primary btn-sm mt-2">Смотреть запчасти для ${brand}</a>
            `;
        }
    }
    
    // Навигация
    document.getElementById('prevPage').addEventListener('click', () => {
        if (currentPage > 1) {
            currentPage--;
            renderBrandsList();
        }
    });
    
    document.getElementById('nextPage').addEventListener('click', () => {
        if (currentPage < totalPages) {
            currentPage++;
            renderBrandsList();
        }
    });
    
    // Инициализация
    renderBrandsList();
</script>

<style>
    .brand-item {
        cursor: pointer;
        padding: 8px 0;
        border-bottom: 1px solid #eee;
        transition: color 0.2s;
    }
    .brand-item:hover {
        color: #0d6efd;
    }
    .brand-info-card {
        position: sticky;
        top: 20px;
    }
    #paginationControls {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 10px;
        margin-top: 15px;
    }
</style>
{% endblock %}
