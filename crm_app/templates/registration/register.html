{% extends 'crm_app/base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header bg-success text-white">
                <h3 class="mb-0">Регистрация клиента</h3>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label for="id_username" class="form-label">Логин</label>
                        <input type="text" name="username" class="form-control" id="id_username" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="id_password1" class="form-label">Пароль</label>
                        <input type="password" name="password1" class="form-control" id="id_password1" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="id_password2" class="form-label">Подтверждение пароля</label>
                        <input type="password" name="password2" class="form-control" id="id_password2" required>
                    </div>
                    
                    <button type="submit" class="btn btn-success w-100">Зарегистрироваться</button>
                </form>
                <p class="mt-3 text-center">
                    Уже есть аккаунт? <a href="{% url 'login' %}">Войти</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
